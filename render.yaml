services:
  - type: web
    name: sahl-ufc-predictor
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    autoDeploy: true

  - type: cron
    name: sahl-weekly-update
    runtime: python
    region: oregon
    plan: free
    schedule: "0 8 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python auto_update.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GIT_REPO
        sync: false
      - key: GIT_TOKEN
        sync: false
      - key: GIT_USER_EMAIL
        sync: false
      - key: GIT_USER_NAME
        sync: false
