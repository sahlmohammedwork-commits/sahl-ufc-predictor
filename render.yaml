services:
  - type: web
    name: sahl-ufc-predictor
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd backend && python features.py --synthetic && python train.py
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    autoDeploy: true
